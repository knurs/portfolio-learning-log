<script type="text/markdown" id="md-python-for-ai">
## What it is

Python is the leading language for artificial intelligence, data science and automation — and this 5-hour masterclass is about learning it the way it's actually used at work, not just in toy examples. Instead of memorising syntax, the focus is on the professional habits that turn a beginner into someone who can ship real, maintainable AI projects: a clean environment, isolated dependencies, sensible project structure, and version control.

In other words, it teaches the *workflow* around the code as much as the code itself.

## Why a professional setup matters

Writing code is only part of a developer's job. The difference between a hobby script and production-ready work is everything *around* the code: can someone else run it, will it still work in six months, and does it break the moment you start a second project?

A reliable setup answers all three — it keeps each project's tools separate, makes your work reproducible on another machine, and lets you track every change. These are the skills a client or employer actually relies on.

## Setting up your environment

**1. Install the basics.** Install Python and **VS Code** (a free, popular code editor). During the Python install, tick *Add Python to PATH* — PATH is the list of places your system looks for programs, so this lets you run `python` from any terminal.

**2. Add the right extensions.** In VS Code, install the **Python**, **Pylance** (smart autocomplete and type hints) and **Jupyter** (interactive coding) extensions. Together they give you debugging, inline errors and a notebook-style workflow.

**3. Organise with workspaces.** Put each project in its own folder and save it as a VS Code *Workspace* — think of it as a bookmark that remembers your files, settings and layout.

**4. Isolate with virtual environments.** A *virtual environment* is a private copy of Python for one project, so its packages can't clash with another project's. Create one with the built-in tool:

```bash
python -m venv .venv

# activate it:
source .venv/bin/activate     # macOS / Linux
.venv\Scripts\activate        # Windows
```

Or with the modern, much faster tool **uv**:

```bash
uv venv
uv pip install pandas requests
```

> Rule of thumb: never install packages globally. One environment per project, every time.

## The Python building blocks

**Variables, decisions and loops** — store data, branch on conditions, repeat work:

```python
temperature = 22

if temperature > 25:
    print("It's warm")
else:
    print("It's mild")

for day in ["Mon", "Tue", "Wed"]:
    print(day)
```

**Lists and dictionaries** — the two everyday containers. A list is an ordered collection; a dictionary maps keys to values:

```python
scores = [88, 92, 75]
student = {"name": "Kübra", "track": "AI"}

print(scores[0])          # 88
print(student["track"])   # AI
```

**Functions and f-strings** — package reusable logic and build readable text:

```python
def greet(name):
    return f"Hello, {name}!"

print(greet("Kübra"))     # Hello, Kübra!
```

## Working with data and APIs

External **libraries** are pre-written toolkits you import. Two you'll use constantly: **Requests** to talk to APIs, and **Pandas** to analyse data. An **API** (Application Programming Interface) is how programs ask each other for data — the main way modern AI systems fetch information.

Always wrap network calls in error handling so one failed request doesn't crash your program, and catch a *specific* exception rather than using a bare `except`:

```python
import requests

try:
    response = requests.get("https://api.example.com/data")
    response.raise_for_status()      # error on a bad HTTP status
    data = response.json()
except requests.RequestException as error:
    print(f"Request failed: {error}")
```

Loading and inspecting a dataset with Pandas:

```python
import pandas as pd

df = pd.read_csv("data/sales.csv")
print(df.head())              # first rows
print(df["revenue"].mean())   # a quick stat
```

## Version control with Git

**Git** lets you take snapshots (*commits*) of your code, and **GitHub** stores them online so you can track progress and collaborate. A typical first push:

```bash
git init
git add .
git commit -m "First snapshot of my project"
git branch -M main
git remote add origin https://github.com/your-username/your-repo.git
git push -u origin main
```

## Modern tooling: uv and ruff

Two tools that speed everything up. **uv** creates environments and installs packages far faster than plain pip. **ruff** is an extremely fast linter and formatter that keeps your code clean and consistent:

```bash
uv pip install ruff
ruff check .     # find problems
ruff format .    # auto-format the code
```

## What I'd remember

> Isolate always — never install packages globally; spin up a fresh virtual environment for every project so nothing breaks existing work.

- Keep a clean structure, with separate `data/` and `output/` folders, so projects stay modular and readable.
- Use the Jupyter interactive window (`Shift+Enter`) to test code line by line instead of re-running whole files.
- A professional setup matters more for real work than memorising syntax — APIs, Git and isolated environments are the everyday backbone of that work.
</script>

<script type="text/markdown" id="md-agentspan-agents">
## What it is

AgentSpan is an open-source framework and orchestration layer for moving AI agents from a terminal demo to a production-ready application. It uses a server–client architecture: a central server tracks each agent's state, history and progress, while *workers* — the Python code you write — do the actual execution. It supports many LLMs (OpenAI, Anthropic and others) and lets you build conversational agents, RAG systems and multi-agent orchestrators. *RAG (Retrieval-Augmented Generation) is when an agent pulls information from an external database to answer more accurately.*

## Why it matters

Production agents are hard because long-running processes crash — a network blip or a database error can throw away expensive work. AgentSpan gives you **durable execution**: if an agent crashes, it resumes from its last successful step instead of starting over. It also adds **observability** (a live dashboard showing which tools the agent called and how it reasoned), simpler **scaling**, and **human-in-the-loop** controls that pause the agent for manual approval before sensitive actions like issuing a refund.

## Step by step

1. **Set up the environment** — install the SDK with `pip` or `uv`. A Java runtime is needed for the server (it runs on Spring Boot).
2. **Start the server** — the SDK can auto-start it, or you run it manually. This backend tracks agent state and orchestration.
3. **Configure credentials** — export your LLM API key (e.g. `OPENAI_API_KEY`) as an environment variable.
4. **Define the agent** — create an `Agent` with a name, a model, and instructions (its system prompt).
5. **Implement tools** — write plain Python functions and mark them with the `@tool` decorator so the agent can call them.
6. **Manage memory** — give the agent conversation memory so it remembers earlier turns.
7. **Run it** — drive the agent inside the `AgentRuntime` to send prompts and get back structured or conversational output.
8. **Orchestrate multiple agents** — for bigger tasks, define specialised agents (e.g. a researcher and a writer) and chain them sequentially or in parallel.

## Key code or commands

Install the SDK, set your key, and start the server:

```bash
uv pip install agentspan          # or: pip install agentspan
export OPENAI_API_KEY=sk-...
agentspan server start            # the SDK can also auto-start this
```

A basic agent with a tool, run through the runtime:

```python
from agentspan.agents import Agent, AgentRuntime, tool
from datetime import datetime

@tool
def get_current_time() -> str:
    """Return the current local time."""
    return datetime.now().strftime("%I:%M:%S %p")

assistant = Agent(
    name="Personal Assistant",
    model="openai/gpt-4o",
    instructions="You are a concise assistant. Use tools when helpful.",
    tools=[get_current_time],
)

with AgentRuntime() as runtime:
    result = runtime.run(assistant, "What time is it?")
    result.print_result()
```

Human-in-the-loop — this tool pauses until a person approves it:

```python
@tool(approval_required=True)
def process_refund(order_id: str, amount: float) -> str:
    """Request a refund. Requires human approval."""
    return f"Refunded {amount} for order {order_id}"
```

Chaining specialised agents into one durable workflow:

```python
from agentspan.agents import Agent, run

researcher = Agent("researcher", model="openai/gpt-4o")
writer     = Agent("writer", model="openai/gpt-4o")
editor     = Agent("editor", model="openai/gpt-4o")

result = run(researcher >> writer >> editor, "state of AI agents in 2026")
```

## What I'd remember

> State lives on the server, not the worker — so you can stop a running script and resume it later from its execution ID without losing progress.

- **Guardrails** are the key security feature: they let you audit and block malicious input (like jailbreak attempts) before it reaches the LLM.
- Returning **structured output** (e.g. via Pydantic models) keeps responses in a predictable shape your other code can read.
- Durable execution means a crash doesn't repeat expensive LLM calls — it picks up where it left off.
</script>

<script type="text/markdown" id="md-playwright-from-zero">
## Why end-to-end testing matters

Unit tests check one function in isolation. **End-to-end (E2E) tests** drive the real app the way a user does — open a page, click, type, assert what's on screen. They catch the bugs that only appear when everything is wired together.

## The three things every Playwright test needs

1. A **page** to act on
2. **Actions** (click, fill, navigate)
3. **Assertions** (expect something to be true)

```js
import { test, expect } from '@playwright/test';

test('user can log in', async ({ page }) => {
  await page.goto('https://example.com/login');
  await page.getByLabel('Email').fill('kns@example.com');
  await page.getByLabel('Password').fill('secret');
  await page.getByRole('button', { name: 'Log in' }).click();
  await expect(page.getByText('Welcome back')).toBeVisible();
});
```

## What I'd tell my past self

> Prefer locators that describe *what the user sees* — `getByRole`, `getByLabel`, `getByText`. CSS selectors break the moment the markup changes.

- **Fixtures** keep setup out of the test body and make parallel runs safe.
- The **trace viewer** is the fastest way to debug a failure after the fact.
- Run headed (`--headed`) the first time so you can watch what happens.

*Next up: wiring these tests into CI so they run on every push.*
</script>

<script type="text/markdown" id="md-intro-to-pentesting">
## What a penetration test actually is

A pentest is an **authorised, simulated attack** on a system to find weaknesses before a real attacker does. The word that matters most is *authorised* — without written scope and permission, the same actions are a crime, not a test.

## The phases, in order

1. **Reconnaissance** — gather public information about the target.
2. **Scanning** — map open ports, services and versions.
3. **Exploitation** — try to gain access through a found weakness.
4. **Post-exploitation** — see how far that access reaches.
5. **Reporting** — write it all up clearly.

## My takeaway

> The report is the product. A brilliant exploit that nobody can understand or fix has no value.

I'm building toward the hands-on labs next, where I'll document each box as its own write-up.

<script type="text/markdown" id="md-first-playwright-test">
## Goal

Write your very first Playwright test from an empty folder — explained line by line, assuming zero setup.

## 1. Install

```bash
npm init playwright@latest
```

This scaffolds a project, installs browsers, and creates an example test.

## 2. The test file, explained

```js
import { test, expect } from '@playwright/test';   // 1
test('homepage has title', async ({ page }) => {    // 2
  await page.goto('https://playwright.dev');        // 3
  await expect(page).toHaveTitle(/Playwright/);     // 4
});
```

1. Import the test runner and the assertion helper.
2. Declare a test. `page` is a fresh browser tab, given to you automatically.
3. `await` because every browser action is asynchronous — we wait for it to finish.
4. Assert the page title matches the regular expression `/Playwright/`.

## 3. Run it

```bash
npx playwright test
```

Green means pass. If it's red, open the trace:

```bash
npx playwright show-report
```

That's a complete, working test. Everything else in Playwright is a variation on these four lines.
</script>

/* ===================================================================
   ====================  ENGINE — no need to edit  ===================
   =================================================================== */
function ytId(url){ if(!url)return null; const m=url.match(/(?:v=|\/embed\/|youtu\.be\/|\/shorts\/)([A-Za-z0-9_-]{11})/); if(m)return m[1]; const b=url.match(/^[A-Za-z0-9_-]{11}$/); return b?b[0]:null; }
const accentVar = a => `var(--${a||'amber'})`;
const domOf = k => DOMAINS[k] || {label:k,accent:"amber"};
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function mdHTML(id){ const el=document.getElementById(id); if(!el||typeof marked==="undefined") return ""; return marked.parse(el.textContent.trim()); }
function readingTime(id){ const el=document.getElementById(id); if(!el)return 1; const w=el.textContent.trim().split(/\s+/).length; return Math.max(1,Math.round(w/200)); }
function fmtDate(d){ try{return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;} }

const app = document.getElementById("app");

/* ---------- footer + nav ---------- */
(function(){
  const defs=[["GitHub",PROFILE.links.github],["LinkedIn",PROFILE.links.linkedin],["Email",PROFILE.links.email?"mailto:"+PROFILE.links.email:""]];
  document.getElementById("links").innerHTML = defs.filter(([_,h])=>h&&!h.includes("your-")).map(([l,h])=>`<a href="${h}" target="_blank" rel="noopener">${l} ↗</a>`).join("") || `<span class="made">add your links in the PROFILE block</span>`;
  document.getElementById("updated").textContent = fmtDate(new Date());
})();

/* ---------- views ---------- */
function viewHome(){
  const total=VIDEOS.length, done=VIDEOS.filter(v=>v.status==="done").length;
  const stats=[[total,"videos logged"],[POSTS.length,"write-ups & code"],[BOOKS.length,"books & articles"],[new Set(VIDEOS.map(v=>v.domain)).size,"domains"]];
  const recentPosts=[...POSTS].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,2);
  const recentVids=VIDEOS.slice(0,3);
  return `
  <section class="hero"><div class="wrap">
    <div class="prompt"><span class="u">kns</span>@<span class="p">learning-log</span>:~$ <span class="c">cat about.md</span><span class="caret"></span></div>
    <h1>Curious by default, always shipping new <span class="hi">skills</span>.</h1>
    <p class="lead">${esc(PROFILE.intro)}</p>
    <div class="idcard">
      <div class="bar"><span class="lights"><i></i><i></i><i></i></span>profile.json</div>
      <div class="idmeta">
        <dl><dt>name</dt><dd>${esc(PROFILE.name)}</dd></dl>
        <dl><dt>role</dt><dd>${esc(PROFILE.role)}</dd></dl>
        <dl><dt>based_in</dt><dd>${esc(PROFILE.location)}</dd></dl>
        <dl><dt>certified</dt><dd>${esc(PROFILE.certified)}</dd></dl>
        <dl><dt>focus</dt><dd>${esc(PROFILE.focus)}</dd></dl>
        <dl><dt>languages</dt><dd><span class="tag">tr</span> · <span class="tag">de</span> · <span class="tag">en</span></dd></dl>
      </div>
    </div>
    <div class="stats">${stats.map(([n,l])=>`<div class="s"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("")}</div>
  </div></section>
  <div class="view"><div class="wrap homeblocks">
    <div>
      <div class="minirow"><h3>Latest write-ups</h3><a href="#/writeups">all write-ups →</a></div>
      <div class="grid">${recentPosts.map(postCard).join("")}</div>
    </div>
    <div>
      <div class="minirow"><h3>Recently logged</h3><a href="#/library">full library →</a></div>
      <div class="grid">${recentVids.map(videoCard).join("")}</div>
    </div>
  </div></div>`;
}

let libFilter="all";
function viewLibrary(){
  const items=[["all","All"]].concat(Object.entries(DOMAINS).map(([k,d])=>[k,d.label]));
  const count=k=>k==="all"?VIDEOS.length:VIDEOS.filter(v=>v.domain===k).length;
  const list=libFilter==="all"?VIDEOS:VIDEOS.filter(v=>v.domain===libFilter);
  return `<div class="view"><div class="wrap">
    <div class="shead"><span class="eyebrow">// the library</span><h2>What I'm studying</h2>
      <p>Every entry is something I've actually watched and learned from. Tap any card to play it with my notes alongside.</p></div>
    <div class="filters">${items.map(([k,l])=>{const a=k==="all"?"amber":domOf(k).accent;return `<button data-f="${k}" aria-pressed="${k===libFilter}" style="--accent:${accentVar(a)}"><span class="dotc"></span>${l}<span class="ct">${count(k)}</span></button>`;}).join("")}</div>
    <div class="grid">${list.length?list.map(videoCard).join(""):`<div class="empty">// nothing in this domain yet</div>`}</div>
  </div></div>`;
}

function viewPosts(kind){
  const list=POSTS.filter(p=>p.kind===kind).sort((a,b)=>b.date.localeCompare(a.date));
  const isCode=kind==="code";
  return `<div class="view"><div class="wrap">
    <div class="shead"><span class="eyebrow" style="${isCode?'color:var(--green)':''}">// ${isCode?'code & labs':'write-ups'}</span>
      <h2>${isCode?'Code, explained line by line':'Write-ups'}</h2>
      <p>${isCode?'Small, fully-explained code lessons — built to teach the thing from scratch, the way I wish it had been taught to me.':'Long-form notes where I explain what I learned from a video or topic, assuming the reader is starting from zero.'}</p></div>
    <div class="grid">${list.length?list.map(postCard).join(""):`<div class="empty">// no entries here yet — add one to POSTS with kind:"${kind}"</div>`}</div>
  </div></div>`;
}

function viewPost(slug){
  const p=POSTS.find(x=>x.slug===slug);
  if(!p) return notFound();
  const d=domOf(p.domain), id=ytId(p.video);
  const back=p.kind==="code"?"#/code":"#/writeups";
  return `<div class="view"><div class="wrap">
    <a class="back" href="${back}">← back</a>
    <div class="posthead">
      <div class="metaline"><span class="dlabel" style="--accent:${accentVar(d.accent)}">${d.label}</span><span>${fmtDate(p.date)}</span><span>${readingTime(p.md)} min read</span></div>
      <h1>${esc(p.title)}</h1>
      ${p.summary?`<p class="summary">${esc(p.summary)}</p>`:""}
    </div>
    ${id?`<div class="videoframe"><iframe src="https://www.youtube.com/embed/${id}?rel=0" allow="encrypted-media;picture-in-picture" allowfullscreen></iframe></div>`:""}
    <article class="prose">${mdHTML(p.md)}</article>
  </div></div>`;
}

function viewReading(){
  return `<div class="view"><div class="wrap">
    <div class="shead"><span class="eyebrow" style="color:var(--cyan)">// reading</span><h2>Books &amp; articles</h2>
      <p>What I'm reading around QA, security and the craft of building software — with running notes.</p></div>
    <div class="shelf">${BOOKS.length?BOOKS.map(bookCard).join(""):`<div class="empty">// add a book or article to BOOKS</div>`}</div>
  </div></div>`;
}

function viewBook(slug){
  const b=BOOKS.find(x=>x.slug===slug);
  if(!b) return notFound();
  const stars=b.rating?"★".repeat(b.rating)+"☆".repeat(5-b.rating):"";
  return `<div class="view"><div class="wrap">
    <a class="back" href="#/reading">← back to reading</a>
    <div class="posthead">
      <div class="metaline"><span style="text-transform:uppercase;letter-spacing:.05em">${b.type}</span>${b.status?`<span style="${b.status==='done'?'color:var(--green)':''}">${b.status}</span>`:""}${stars?`<span class="stars" style="color:var(--amber)">${stars}</span>`:""}</div>
      <h1>${esc(b.title)}</h1>
      ${b.author?`<p class="summary">by ${esc(b.author)}</p>`:""}
      ${b.link?`<p style="margin-top:10px"><a class="back" href="${b.link}" target="_blank" rel="noopener">view source ↗</a></p>`:""}
    </div>
    <article class="prose">${b.md?mdHTML(b.md):'<p style="color:var(--ink-faint);font-family:var(--font-mono)">// no notes yet</p>'}</article>
  </div></div>`;
}

function viewAbout(){
  return `<div class="view"><div class="wrap">
    <div class="shead"><span class="eyebrow">// about</span><h2>About me</h2></div>
    <article class="prose">
      <p>I'm <strong>${esc(PROFILE.name)}</strong> — a <strong>${esc(PROFILE.role)}</strong> based in ${esc(PROFILE.location)}. I work across Turkish, German and English, and I care about <strong>practical, hands-on</strong> learning over pure theory.</p>
      <p>This site is my open learning log. Rather than just listing skills on a CV, I keep the actual material I'm working through — the videos, the write-ups where I re-explain things from scratch, the code I'm practising, and the books I'm reading. It's both my study space and an honest picture of where I'm growing.</p>
      <p>If you're a recruiter or hiring manager: everything here is current and maintained by me. Reach out through any of the links in the footer.</p>
    </article>
  </div></div>`;
}

function notFound(){ return `<div class="view"><div class="wrap"><div class="empty">// 404 — nothing here. <a href="#/" style="color:var(--cyan)">go home</a></div></div></div>`; }

let repoFilter="all";
function viewRepos(){
  const items=[["all","All"]].concat(Object.entries(DOMAINS).map(([k,d])=>[k,d.label]));
  const count=k=>k==="all"?REPOS.length:REPOS.filter(r=>r.k===k).length;
  return `<div class="view"><div class="wrap">
    <div class="shead"><span class="eyebrow">// toolbox</span><h2>Useful GitHub repos</h2>
      <p>A hand-picked toolbox of ${REPOS.length} repositories I keep coming back to — across testing, security, programming and AI. Search, or filter by domain.</p></div>
    <div class="repocontrols">
      <div class="reposearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="repoSearch" type="text" placeholder="search repos…" aria-label="Search repositories"></div>
      <div class="filters" id="repoFilters">${items.map(([k,l])=>{const a=k==="all"?"amber":domOf(k).accent;return `<button data-rf="${k}" aria-pressed="${k===repoFilter}" style="--accent:${accentVar(a)}"><span class="dotc"></span>${l}<span class="ct">${count(k)}</span></button>`;}).join("")}</div>
    </div>
    <div class="repogrid" id="repoGrid">${REPOS.map(repoCard).join("")}</div>
    <div class="empty reposempty" id="reposEmpty">// no repos match your search</div>
  </div></div>`;
}
function repoCard(r){
  const d=domOf(r.k), accent=accentVar(d.accent), url="https://github.com/"+r.n;
  const s=(r.n+" "+r.d).toLowerCase();
  return `<a class="repo" style="--accent:${accent}" href="${url}" target="_blank" rel="noopener" data-k="${r.k}" data-s="${esc(s)}">
    <span class="dlabel">${d.label}</span>
    <h3 class="rname">${esc(r.n)}</h3>
    <p class="rdesc">${esc(r.d)}</p>
    <span class="rlink">github.com/${esc(r.n)} ↗</span>
  </a>`;
}
function bindRepos(){
  const grid=document.getElementById("repoGrid"); if(!grid)return;
  const search=document.getElementById("repoSearch");
  const emptyEl=document.getElementById("reposEmpty");
  const fbtns=document.querySelectorAll("#repoFilters button[data-rf]");
  function apply(){
    const q=(search&&search.value||"").trim().toLowerCase(); let shown=0;
    grid.querySelectorAll(".repo").forEach(c=>{
      const okK=repoFilter==="all"||c.dataset.k===repoFilter;
      const okQ=!q||c.dataset.s.indexOf(q)>-1;
      const vis=okK&&okQ; c.style.display=vis?"":"none"; if(vis)shown++;
    });
    if(emptyEl) emptyEl.style.display=shown?"none":"block";
  }
  fbtns.forEach(b=>b.addEventListener("click",()=>{repoFilter=b.dataset.rf;fbtns.forEach(x=>x.setAttribute("aria-pressed",x.dataset.rf===repoFilter));apply();}));
  if(search) search.addEventListener("input",apply);
  apply();
}

/* ---------- card builders ---------- */
function videoCard(v){
  const id=ytId(v.url), d=domOf(v.domain), accent=accentVar(d.accent);
  const thumb=id?`https://i.ytimg.com/vi/${id}/hqdefault.jpg`:"";
  const i=VIDEOS.indexOf(v);
  const sCls=v.status==="done"?"stat done":"stat", sTxt=v.status==="done"?"completed":"in progress";
  const n=(v.takeaways||[]).length, meta=n?`${n} note${n>1?"s":""}`:"no notes yet";
  return `<button class="card" style="--accent:${accent}" data-vi="${i}" aria-label="Play: ${esc(v.title)}">
    <div class="thumb">${thumb?`<img src="${thumb}" alt="" loading="lazy">`:""}<span class="${sCls}">${sTxt}</span>
      <span class="play"><span><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></span></div>
    <div class="cbody"><span class="dlabel">${d.label}</span><h3>${esc(v.title)}</h3>${v.note?`<p class="note">${esc(v.note)}</p>`:""}<span class="meta">${meta}</span></div>
  </button>`;
}
function postCard(p){
  const d=domOf(p.domain), accent=accentVar(d.accent);
  const href=`#/${p.kind==="code"?"code":"writeups"}/${p.slug}`;
  return `<a class="pcard ${p.kind==="code"?"code":""}" style="--accent:${accent}" href="${href}">
    <div class="top"><span class="dlabel">${d.label}</span><span class="date">${fmtDate(p.date)}</span></div>
    <h3>${esc(p.title)}</h3>${p.summary?`<p>${esc(p.summary)}</p>`:""}
    <span class="read">${readingTime(p.md)} min read →</span></a>`;
}
function bookCard(b){
  const stars=b.rating?"★".repeat(b.rating):"";
  return `<a class="bookcard" href="#/reading/${b.slug}">
    <span class="kind">${b.type}</span><h3>${esc(b.title)}</h3>${b.author?`<span class="author">${esc(b.author)}</span>`:""}
    <div class="rowb"><span class="stat2 ${b.status==='done'?'done':''}">${b.status||""}</span><span class="stars">${stars}</span></div></a>`;
}

/* ---------- video modal ---------- */
const modal=document.getElementById("modal"), mFrame=document.getElementById("modalFrame"),
      mTitle=document.getElementById("modalTitle"), mDom=document.getElementById("modalDomain"), mNotes=document.getElementById("modalNotes");
let lastFocused=null;
function openModal(i){
  const v=VIDEOS[i]; if(!v)return; const id=ytId(v.url), d=domOf(v.domain);
  lastFocused=document.activeElement;
  mTitle.textContent=v.title; mDom.textContent=d.label;
  mDom.style.setProperty("--accent",accentVar(d.accent)); mNotes.style.setProperty("--accent",accentVar(d.accent));
  mFrame.innerHTML=id?`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>`:`<div class="empty" style="height:100%;display:grid;place-items:center">// invalid link</div>`;
  const t=v.takeaways||[], tp=v.topics||[];
  mNotes.innerHTML=`<div class="nh">My notes</div>`+(t.length?`<ul>${t.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:`<p class="none">// no notes yet</p>`)+(tp.length?`<div class="topics">${tp.map(x=>`<span>${esc(x)}</span>`).join("")}</div>`:"");
  modal.classList.add("open"); document.body.style.overflow="hidden"; document.getElementById("modalClose").focus();
}
function closeModal(){ modal.classList.remove("open"); mFrame.innerHTML=""; document.body.style.overflow=""; if(lastFocused)lastFocused.focus(); }
document.getElementById("modalClose").addEventListener("click",closeModal);
modal.addEventListener("click",e=>{if(e.target===modal)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&modal.classList.contains("open"))closeModal();});

/* ---------- router ---------- */
function router(){
  const parts=(location.hash||"#/").replace(/^#\//,"").split("/").filter(Boolean);
  const [a,b]=parts;
  let html;
  if(!a) html=viewHome();
  else if(a==="library") html=viewLibrary();
  else if(a==="writeups") html=b?viewPost(b):viewPosts("writeup");
  else if(a==="code") html=b?viewPost(b):viewPosts("code");
  else if(a==="reading") html=b?viewBook(b):viewReading();
  else if(a==="repos") html=viewRepos();
  else if(a==="about") html=viewAbout();
  else html=notFound();
  app.innerHTML=html;
  // syntax highlight any rendered code
  if(typeof hljs!=="undefined") app.querySelectorAll("pre code").forEach(el=>hljs.highlightElement(el));
  // bind library
  app.querySelectorAll(".card[data-vi]").forEach(c=>c.addEventListener("click",()=>openModal(+c.dataset.vi)));
  app.querySelectorAll(".filters button[data-f]").forEach(btn=>btn.addEventListener("click",()=>{libFilter=btn.dataset.f;app.innerHTML=viewLibrary();router._rebindLib();}));
  // active nav
  if(a==="repos") bindRepos();
  document.querySelectorAll("#topnav a").forEach(link=>link.classList.toggle("active",(link.dataset.r||"")===(a||"")));
  window.scrollTo({top:0,behavior:"instant"in window?"instant":"auto"});
}
// re-bind after in-place library re-render (filter change)
router._rebindLib=function(){
  app.querySelectorAll(".card[data-vi]").forEach(c=>c.addEventListener("click",()=>openModal(+c.dataset.vi)));
  app.querySelectorAll(".filters button[data-f]").forEach(btn=>btn.addEventListener("click",()=>{libFilter=btn.dataset.f;app.innerHTML=viewLibrary();router._rebindLib();}));
};
window.addEventListener("hashchange",router);
router();
</script>
